name: macOS build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "voice-typer-rs/**"
      - ".github/workflows/macos.yml"

defaults:
  run:
    working-directory: voice-typer-rs

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            voice-typer-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('voice-typer-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build aarch64-apple-darwin
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64-apple-darwin
        run: cargo build --release --target x86_64-apple-darwin

      - name: Lipo + bundle
        run: |
          mkdir -p target/macos/universal
          lipo -create -output target/macos/universal/VoiceTyper \
            target/aarch64-apple-darwin/release/VoiceTyper \
            target/x86_64-apple-darwin/release/VoiceTyper
          file target/macos/universal/VoiceTyper

          # Recreate VoiceTyper.app structure (uses bundle/Info.plist + entitlements.plist)
          APP="target/macos/VoiceTyper.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/macos/universal/VoiceTyper "$APP/Contents/MacOS/VoiceTyper"
          cp bundle/Info.plist "$APP/Contents/Info.plist"

          # Generate icon.icns from logo.png if not already present
          if [ ! -f bundle/icon.icns ] && command -v iconutil >/dev/null; then
            ICONSET="$(mktemp -d)/icon.iconset"
            mkdir -p "$ICONSET"
            for sz in 16 32 64 128 256 512 1024; do
              sips -z "$sz" "$sz" assets/logo.png --out "$ICONSET/icon_${sz}x${sz}.png" >/dev/null
              half=$((sz / 2))
              [ $half -ge 16 ] && cp "$ICONSET/icon_${sz}x${sz}.png" "$ICONSET/icon_${half}x${half}@2x.png"
            done
            iconutil -c icns "$ICONSET" -o bundle/icon.icns
          fi
          [ -f bundle/icon.icns ] && cp bundle/icon.icns "$APP/Contents/Resources/icon.icns"

          codesign --force --sign - \
            --options runtime \
            --entitlements bundle/entitlements.plist \
            "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Build DMG
        run: |
          APP="target/macos/VoiceTyper.app"
          DMG="target/macos/VoiceTyper.dmg"
          STAGE="target/macos/dmg-stage"
          rm -rf "$STAGE" "$DMG"
          mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "VoiceTyper" -srcfolder "$STAGE" -ov -format UDZO "$DMG"

      - name: Zip the .app
        run: |
          cd target/macos
          ditto -c -k --keepParent VoiceTyper.app VoiceTyper.app.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoiceTyper-macos
          path: |
            voice-typer-rs/target/macos/VoiceTyper.app.zip
            voice-typer-rs/target/macos/VoiceTyper.dmg
          if-no-files-found: error
          retention-days: 30
